spring.application.name=ms-competition-reg
server.port=${SERVER_PORT:8094}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_competition}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:clave_secreta_carmeet_2026_muy_segura__123456789}

# URLs de microservicios para WebClient
services.event-core.base-url=${EVENT_CORE_URL:http://localhost:8091}
services.vehicle-registry.base-url=${VEHICLE_REGISTRY_URL:http://localhost:8092}
services.notification-log.base-url=${NOTIFICATION_LOG_URL:http://localhost:8099}


# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
