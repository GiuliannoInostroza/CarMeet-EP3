spring.application.name=ms-gateway
server.port=${SERVER_PORT:8777}

# ============================================================
# Rutas del API Gateway – CarMeet (puerto 8777)
# El Gateway SOLO enruta. JWT sigue siendo validado en cada ms.
# ============================================================

# --- ms-auth-user (8090) ---
spring.cloud.gateway.server.webmvc.routes[0].id=ms-auth-user
spring.cloud.gateway.server.webmvc.routes[0].uri=${AUTH_USER_URL:http://localhost:8090}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/auth/**

# --- ms-event-core (8091) ---
spring.cloud.gateway.server.webmvc.routes[1].id=ms-event-core
spring.cloud.gateway.server.webmvc.routes[1].uri=${EVENT_CORE_URL:http://localhost:8091}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/eventos/**

