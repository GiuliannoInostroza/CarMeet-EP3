spring.application.name=ms-ticketing
server.port=${SERVER_PORT:8093}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_ticketing}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:clave_secreta_carmeet_2026_muy_segura__123456789}

# URLs de microservicios para WebClient
services.event-core.base-url=${EVENT_CORE_URL:http://localhost:8091}
services.payment-mock.base-url=${PAYMENT_MOCK_URL:http://localhost:8097}
services.notification-log.base-url=${NOTIFICATION_LOG_URL:http://localhost:8099}
